apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-provider-user-bootstrap-sa
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "6"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-provider-user-bootstrap-role
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - crossplane-keycloak-provider-credentials
      - "{{ .Values.bootstrap.breakglassAdmin.username }}"
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-provider-user-bootstrap-binding
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "6"
subjects:
  - kind: ServiceAccount
    name: keycloak-provider-user-bootstrap-sa
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: keycloak-provider-user-bootstrap-role
  apiGroup: rbac.authorization.k8s.io
