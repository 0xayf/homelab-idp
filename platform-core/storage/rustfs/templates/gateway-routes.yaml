---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rustfs-security-headers
  namespace: "{{ .Release.Namespace }}"
spec:
  headers:
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rustfs-console-auth
  namespace: "{{ .Release.Namespace }}"
spec:
  forwardAuth:
    address: http://{{ .Values.gateway.oauth2ProxyService.name }}.{{ .Values.gateway.oauth2ProxyService.namespace }}.svc.cluster.local/
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
---
# S3 API — HTTP redirect to HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-api-http
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: web
  hostnames:
    - {{ .Values.gateway.apiService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
---
# S3 API — HTTPS (no auth, S3 clients use access key/secret key)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-api-https
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    - {{ .Values.gateway.apiService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rustfs-security-headers
      backendRefs:
        - name: {{ .Values.gateway.apiService.name }}
          port: {{ .Values.gateway.apiService.port }}
---
# Console — HTTP redirect to HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-console-http
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: web
  hostnames:
    - {{ .Values.gateway.consoleService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
---
# Console — oauth2-proxy callback route
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-console-oauth2
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    - {{ .Values.gateway.consoleService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: {{ .Values.gateway.oauth2ProxyService.name }}
          namespace: {{ .Values.gateway.oauth2ProxyService.namespace }}
          port: {{ .Values.gateway.oauth2ProxyService.port }}
---
# Console — HTTPS with forward auth via oauth2-proxy
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-console-https
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    - {{ .Values.gateway.consoleService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rustfs-console-auth
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rustfs-security-headers
      backendRefs:
        - name: {{ .Values.gateway.consoleService.name }}
          port: {{ .Values.gateway.consoleService.port }}
