---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rustfs-security-headers
  namespace: "{{ .Release.Namespace }}"
spec:
  headers:
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
---
# S3 API — HTTP redirect to HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-api-http
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: web
  hostnames:
    - {{ .Values.gateway.apiService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
---
# S3 API — HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-api-https
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    - {{ .Values.gateway.apiService.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rustfs-security-headers
      backendRefs:
        - name: {{ .Values.gateway.apiService.name }}
          port: {{ .Values.gateway.apiService.port }}
---
# Console — HTTP redirect to HTTPS
