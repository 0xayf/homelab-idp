gitea:
  baseUrl: http://gitea-http.gitea.svc.cluster.local:3000

  service:
    ssh:
      type: LoadBalancer
      loadBalancerIP: __GITEA_SSH_LOADBALANCER_IP__
      port: 22
      externalTrafficPolicy: Local
      loadBalancerSourceRanges: __GITEA_SSH_SOURCE_RANGES__

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: lab-ca-issuer
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/hsts: "true"
    hosts:
      - host: __GITEA_HOSTNAME__
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: gitea-tls-secret
        hosts:
          - __GITEA_HOSTNAME__

  gitea:
    config:
      server:
        DOMAIN: __GITEA_HOSTNAME__
        SSH_DOMAIN: __GITEA_SSH_HOSTNAME__
        ROOT_URL: https://__GITEA_HOSTNAME__/
        SSH_PORT: 22
        SSH_LISTEN_PORT: 2222

  postgresql:
    enabled: true
    persistence:
      enabled: true

  postgresql-ha:
    enabled: false

  persistence:
    enabled: true
    size: 5Gi
    labels:
      app.kubernetes.io/managed-by: argocd
