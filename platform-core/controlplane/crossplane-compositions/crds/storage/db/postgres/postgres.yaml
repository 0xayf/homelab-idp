apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgres.storage.local.lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    crossplane.io/xrd: postgres.storage.local.lab
spec:
  compositeTypeRef:
    apiVersion: storage.local.lab/v1alpha1
    kind: Postgres
  mode: Pipeline
  pipeline:
    - step: render-postgres
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := getCompositeResource . -}}
            {{- $namespace := $xr.metadata.namespace -}}
            {{- $name := $xr.metadata.name -}}
            {{- $databaseName := $xr.spec.databaseName -}}
            {{- $storageSize := default "1Gi" $xr.spec.storageSize -}}
            {{- $resources := default dict $xr.spec.resources -}}
            {{- $cpuLimit := default "500m" $resources.cpu -}}
            {{- $memoryLimit := default "512Mi" $resources.memory -}}
            {{- $postInitSQL := default (list) $xr.spec.postInitSQL -}}
            {{- $postInitSQLConfigMapName := $xr | dig "spec" "postInitSQLConfigMapRef" "name" "" -}}
            {{- $postInitSQLConfigMapKey := $xr | dig "spec" "postInitSQLConfigMapRef" "key" "" -}}
            {{- $schema := default "" $xr.spec.schema -}}
            {{- if $schema -}}
              {{- $postInitSQL = prepend $postInitSQL (printf "ALTER SCHEMA %s OWNER TO %s" $schema $databaseName) -}}
              {{- $postInitSQL = prepend $postInitSQL "DROP SCHEMA IF EXISTS public" -}}
              {{- $postInitSQL = prepend $postInitSQL (printf "CREATE SCHEMA IF NOT EXISTS %s" $schema) -}}
            {{- end -}}
            {{- $clusterName := printf "pg-%s" $databaseName -}}
            {{- $secretName := printf "%s-db" $databaseName -}}
            {{- $primaryHost := printf "%s-rw.%s.svc.cluster.local" $clusterName $namespace -}}
            {{- $connectionParams := default (dict) $xr.spec.connectionParams -}}
            {{- $defaultParams := dict "sslmode" "require" -}}
            {{- $mergedParams := merge $defaultParams $connectionParams -}}
            {{- $paramKeys := sortAlpha (keys $mergedParams) -}}
            {{- $paramPairs := list -}}
            {{- range $i, $k := $paramKeys -}}
              {{- $v := get $mergedParams $k -}}
              {{- $paramPairs = append $paramPairs (printf "%s=%s" $k (urlquery (printf "%v" $v))) -}}
            {{- end -}}
            {{- $queryString := join "&" $paramPairs -}}
            {{- $uriTemplate := printf "postgresql://{{ .username }}:{{ .password | urlquery }}@%s:5432/%s?%s" $primaryHost $databaseName $queryString -}}
            ---
            {{/* Create UserPass claim — delegates password generation and Vault storage */}}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: userpass-claim
            spec:
              forProvider:
                manifest:
                  apiVersion: secrets.local.lab/v1alpha1
                  kind: UserPass
                  metadata:
                    name: {{ $secretName }}
                    namespace: {{ $namespace }}
                  spec:
                    username: {{ $databaseName }}
                    length: 48
                    includeSymbols: true
                    outputTemplate:
                      onlyTemplate: false
                      secretKey: uri
                      values:
                        uri: {{ $uriTemplate | quote }}
                      template: {{ `'{{ .uri }}'` }}
              readiness:
                policy: DeriveFromObject
              providerConfigRef:
                kind: ClusterProviderConfig
                name: provider-kubernetes-config
            ---
            {{/* Create CloudNative-PG Cluster */}}
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cnpg-cluster
            spec:
              forProvider:
                manifest:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $clusterName }}
                    namespace: {{ $namespace }}
                  spec:
                    instances: 1
                    imageName: ghcr.io/cloudnative-pg/postgresql:18
                    bootstrap:
                      initdb:
                        database: {{ $databaseName }}
                        owner: {{ $databaseName }}
                        secret:
                          name: {{ $secretName }}
                        {{- if gt (len $postInitSQL) 0 }}
                        postInitApplicationSQL:
                        {{- toYaml $postInitSQL | nindent 26 }}
                        {{- end }}
                        {{- if and (ne $postInitSQLConfigMapName "") (ne $postInitSQLConfigMapKey "") }}
                        postInitApplicationSQLRefs:
                          configMapRefs:
                            - name: {{ $postInitSQLConfigMapName }}
                              key: {{ $postInitSQLConfigMapKey }}
                        {{- end }}
                    storage:
                      size: {{ $storageSize }}
                    resources:
                      limits:
                        cpu: {{ $cpuLimit | quote }}
                        memory: {{ $memoryLimit | quote }}
                      requests:
                        cpu: "100m"
                        memory: "256Mi"
                    monitoring:
                      enablePodMonitor: false
              readiness:
                policy: DeriveFromObject
              providerConfigRef:
                kind: ClusterProviderConfig
                name: provider-kubernetes-config
              references:
                - dependsOn:
                    apiVersion: v1
                    kind: Secret
                    namespace: {{ $namespace }}
                    name: {{ $secretName }}
            ---
            apiVersion: storage.local.lab/v1alpha1
            kind: Postgres
            metadata:
              name: {{ $xr.metadata.name }}
            status:
              clusterName: {{ $clusterName }}
              primaryHost: {{ $primaryHost }}
              ready: true
    - step: auto-ready
      functionRef:
        name: function-auto-ready
