apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: postgres.storage.local.lab
spec:
  group: storage.local.lab
  names:
    kind: Postgres
    plural: postgres
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - databaseName
              properties:
                databaseName:
                  type: string
                  description: |
                    Name of the database. Used for the PostgreSQL database name,
                    user name, and resource naming.
                  pattern: "^[a-z][a-z0-9-]{0,61}[a-z0-9]$"
                  minLength: 2
                  maxLength: 63
                storageSize:
                  type: string
                  description: Size of the persistent volume for each instance
                  default: "1Gi"
                  pattern: "^[0-9]+[GM]i$"
                resources:
                  type: object
                  description: Resource limits for PostgreSQL pods
                  properties:
                    cpu:
                      type: string
                      description: CPU limit
                      default: "500m"
                    memory:
                      type: string
                      description: Memory limit
                      default: "512Mi"
                postInitSQL:
                  type: array
                  description: |
                    Optional SQL statements executed after database creation.
                    Mapped to CloudNativePG bootstrap initdb postInitApplicationSQL.
                  items:
                    type: string
                postInitSQLConfigMapRef:
                  type: object
                  description: |
                    Optional reference to a ConfigMap containing a SQL script to
                    execute after database creation.
                    Mapped to CloudNativePG bootstrap initdb postInitApplicationSQLRefs.configMapRefs.
                  required:
                    - name
                    - key
                  properties:
                    name:
                      type: string
                      description: Name of the ConfigMap
                    key:
                      type: string
                      description: Key in the ConfigMap containing SQL
                schema:
                  type: string
                  description: |
                    Optional schema name to create in the database after initialisation.
                    When set, the composition will automatically run:
                      CREATE SCHEMA IF NOT EXISTS <schema>
                      DROP SCHEMA IF EXISTS public
                    The public schema is dropped to prevent accidental use.
                  pattern: "^[a-z][a-z0-9_]{0,61}[a-z0-9]$"
                connectionParams:
                  type: object
                  description: |
                    Optional connection URI query parameters appended to the
                    generated database URI.
                    Example: {sslmode: require, search_path: myapp}
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                clusterName:
                  type: string
                  description: Name of the CloudNative-PG cluster
                primaryHost:
                  type: string
                  description: Hostname of the primary PostgreSQL instance
                ready:
                  type: boolean
                  description: Whether the database is ready
