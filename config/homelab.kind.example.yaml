cluster:
  # Not used for Kind provisioning; kept for generated Ansible inventory compatibility.
  server_ip: 127.0.0.1

storage:
  # Kind's built-in local-path provisioner usually registers as "standard".
  default_class: standard

network:
  # These values must be in your kind network subnet.
  metallb_ip_range: 10.89.0.20-10.89.0.21
  traefik_loadbalancer_ip: 10.89.0.20
  gitea_ssh_loadbalancer_ip: 10.89.0.21

  # Optional hardening for Gitea SSH. Delete block to allow all sources.
  # gitea_ssh_allowed_sources:
  #   - 10.89.0.0/24

  # Optional hardening for Traefik dashboard. Delete block to allow all sources.
  # traefik_dashboard_allowed_sources:
  #   - 10.89.0.0/24

admin:
  first_name: Lab
  last_name: Admin
  email: admin@local.lab

dns:
  base_domain: local.lab
  prefixes:
    argocd: cd
    gitea: git
    gitea_ssh: git-ssh
    keycloak: auth
    traefik: gateway
    vault: secrets
    rustfs_console: storage
    rustfs_api: s3
