cluster:
  # Not used for Kind provisioning; kept for generated Ansible inventory compatibility.
  server_ip: 127.0.0.1

storage:
  # Kind's built-in local-path provisioner usually registers as "standard".
  default_class: standard

network:
  # These values must be in your kind network subnet.
  metallb_ip_range: 10.89.0.20-10.89.0.30
  ingress_nginx_loadbalancer_ip: 10.89.0.20
  gitea_ssh_loadbalancer_ip: 10.89.0.21

  # Optional hardening for Gitea SSH. Delete block to allow all sources.
  # gitea_ssh_allowed_sources:
  #   - 10.89.0.0/24

ingress:
  base_domain: lab
  prefixes:
    argocd: cd
    gitea: git
    gitea_ssh: git-ssh
    vault: secrets
    minio: storage
    minio_api: s3
