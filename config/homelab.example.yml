cluster:
  server_ip: 10.0.0.10
network:
  metallb_ip_range: 10.0.0.20-10.0.0.21
  ingress_nginx_loadbalancer_ip: 10.0.0.20
  gitea_ssh_loadbalancer_ip: 10.0.0.21
  # Optional hardening: restrict Gitea SSH source CIDRs.
  # Delete this block to allow SSH from all source addresses.
  gitea_ssh_allowed_sources:
    - 10.0.0.0/24
    - 10.0.10.100/32
ingress:
  base_domain: lab
  prefixes:
    argocd: cd
    gitea: git
    gitea_ssh: git-ssh
    vault: secrets
    minio: storage
    minio_api: s3
