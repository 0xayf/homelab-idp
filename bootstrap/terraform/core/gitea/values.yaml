service:
  ssh:
    type: LoadBalancer
    loadBalancerIP: ${ssh_loadbalancer_ip}
    port: 22
    externalTrafficPolicy: Local
    loadBalancerSourceRanges: ${jsonencode(ssh_allowed_sources)}

gitea:
  config:
    server:
      DOMAIN: ${hostname}
      SSH_DOMAIN: ${ssh_hostname}
      ROOT_URL: https://${hostname}/
      SSH_PORT: 22
      SSH_LISTEN_PORT: 2222

  admin:
    username: ${username}
    password: "${password}"
    email: ${email}

postgresql:
  enabled: true
  persistence:
    enabled: true

postgresql-ha:
  enabled: false

persistence:
  enabled: true
  size: 5Gi
